name: CI

on:
  pull_request:
    branches: [master]

jobs:
  validate-and-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install validation dependency
        run: python -m pip install "PyYAML==6.0.2"

      - name: Validate modelling artifacts
        run: python scripts/validate_artifacts.py

      - name: Bytecode compile check
        run: python -m compileall -q apps tests

      - name: Run unit tests
        run: python -m unittest discover -s tests -p "test_*.py" -v
