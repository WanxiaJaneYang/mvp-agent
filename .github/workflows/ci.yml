name: CI

on:
  pull_request:
    branches: [master]

jobs:
  validate-and-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install project and dev tooling
        run: python -m pip install -e ".[dev]"

      - name: Validate modelling artifacts
        run: python scripts/validate_artifacts.py

      - name: Validate decision record schema example
        run: python scripts/validate_decision_record_schema.py

      - name: Bytecode compile check
        run: python -m compileall -q apps tests scripts

      - name: Run unit tests
        run: python -m unittest discover -s tests -t . -p "test_*.py" -v
